  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

antialiased}\n  html{scroll-behavior:smooth}\n  ::selection{background:var(--accent);color:#fff}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ themeStyle }};background:var(--paper);color:var(--ink);min-height:100vh\">\n\n  <!-- ===== NAV ===== -->\n  <header style=\"position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 40px;height:68px;display:flex;align-items:center;justify-content:space-between\">\n      <a href=\"#top\" style=\"display:flex;align-items:center;gap:10px;text-decoration:none\">\n        <span style=\"width:26px;height:26px;border-radius:6px;background:var(--ink);display:flex;align-items:center;justify-content:center;font:700 13px 'Space Grotesk';color:var(--paper)\">M<\u002Fspan>\n        <span style=\"font:700 15px 'Space Grotesk';letter-spacing:-.01em;color:var(--ink)\">A. Mishra<\u002Fspan>\n      <\u002Fa>\n      <nav style=\"display:flex;align-items:center;gap:28px\">\n        <a href=\"#work\" style=\"font:500 11px 'IBM Plex Mono';letter-spacing:.06em;color:var(--sub);text-decoration:none\" style-hover=\"color:var(--ink)\">WORK<\u002Fa>\n        <a href=\"#method\" style=\"font:500 11px 'IBM Plex Mono';letter-spacing:.06em;color:var(--sub);text-decoration:none\" style-hover=\"color:var(--ink)\">METHOD<\u002Fa>\n        <a href=\"#about\" style=\"font:500 11px 'IBM Plex Mono';letter-spacing:.06em;color:var(--sub);text-decoration:none\" style-hover=\"color:var(--ink)\">ABOUT<\u002Fa>\n        <a href=\"#signal\" style=\"font:500 11px 'IBM Plex Mono';letter-spacing:.06em;color:var(--sub);text-decoration:none\" style-hover=\"color:var(--ink)\">SIGNAL<\u002Fa>\n        <a href=\"#contact\" style=\"font:600 11px 'Space Grotesk';color:var(--accent-ink);background:var(--accent);padding:9px 16px;border-radius:20px;text-decoration:none\" style-hover=\"filter:brightness(1.06)\">Contact<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"top\" style=\"max-width:1180px;margin:0 auto;padding:84px 40px 76px;display:grid;grid-template-columns:1.35fr 1fr;gap:64px;align-items:center\">\n    <div>\n      <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent)\">// PRODUCT &amp; VENTURE LEADERSHIP<\u002Fdiv>\n      <h1 style=\"font:700 60px/1.04 'Space Grotesk';letter-spacing:-.03em;color:var(--ink);margin:20px 0 0;text-wrap:balance\">I build products and ventures in markets I had to learn from scratch.<\u002Fh1>\n      <p style=\"font:400 18px/1.6 'Libre Franklin';color:var(--sub);margin:24px 0 0;max-width:560px\">Fifteen years turning complex, regulated problems into products that ship, scale, and exit — across digital health, CRM intelligence, and real estate. Most recently at UPMC Enterprises, where I took a clinical workflow platform from internal tool to acquisition.<\u002Fp>\n      <div style=\"display:flex;gap:12px;margin-top:32px\">\n        <a href=\"#method\" style=\"display:inline-flex;align-items:center;gap:8px;font:600 14px 'Space Grotesk';color:var(--accent-ink);background:var(--accent);padding:14px 24px;border-radius:28px;text-decoration:none\" style-hover=\"filter:brightness(1.06);transform:translateY(-1px)\">See how I think →<\u002Fa>\n        <a href=\"#work\" style=\"display:inline-flex;align-items:center;gap:8px;font:600 14px 'Space Grotesk';color:var(--ink);background:transparent;border:1.5px solid var(--ink);padding:13px 22px;border-radius:28px;text-decoration:none\" style-hover=\"background:var(--ink);color:var(--paper)\">Read the case studies →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;margin-top:40px;flex-wrap:wrap\">\n        <div><div style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--ink)\">15 YEARS<\u002Fdiv><div style=\"font:500 11px 'IBM Plex Mono';color:var(--sub);margin-top:3px\">building<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:1px;background:var(--border)\"><\u002Fdiv>\n        <div><div style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--ink)\">3 MARKETS<\u002Fdiv><div style=\"font:500 11px 'IBM Plex Mono';color:var(--sub);margin-top:3px\">health · CRM · real estate<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:1px;background:var(--border)\"><\u002Fdiv>\n        <div><div style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--ink)\">THESIS → EXIT<\u002Fdiv><div style=\"font:500 11px 'IBM Plex Mono';color:var(--sub);margin-top:3px\">acquired by eVisit<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;isolation:isolate;aspect-ratio:4/5;border-radius:10px;overflow:hidden;background:#2a1a0e;box-shadow:0 18px 50px -20px rgba(60,35,15,.5)\">\n      <image-slot id=\"hero-portrait\" shape=\"rect\" placeholder=\"drop your portrait\" style=\"position:absolute;inset:0;width:100%;height:100%;filter:grayscale(1) contrast(1.06)\"><\u002Fimage-slot>\n      <div style=\"position:absolute;inset:0;background:#3a2410;mix-blend-mode:multiply;pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background:#E9B877;mix-blend-mode:screen;pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background:linear-gradient(160deg,rgba(184,110,58,.12),rgba(26,18,10,.4));pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:absolute;left:16px;bottom:14px;pointer-events:none\"><div style=\"font:600 9px 'IBM Plex Mono';letter-spacing:.1em;color:#f3d9b8\">A. MISHRA · PITTSBURGH<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== LOGO STRIP ===== -->\n  <div style=\"border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:22px 40px;display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n      <span style=\"font:500 11px 'IBM Plex Mono';letter-spacing:.1em;color:var(--sub)\">BUILT &amp; SHIPPED AT<\u002Fspan>\n      <span style=\"width:5px;height:5px;border-radius:50%;background:var(--accent)\"><\u002Fspan>\n      <span style=\"font:600 14px 'Space Grotesk';color:var(--ink);opacity:.78\">UPMC Enterprises<\u002Fspan>\n      <span style=\"color:var(--border)\">·<\u002Fspan>\n      <span style=\"font:600 14px 'Space Grotesk';color:var(--ink);opacity:.78\">PayPal<\u002Fspan>\n      <span style=\"color:var(--border)\">·<\u002Fspan>\n      <span style=\"font:600 14px 'Space Grotesk';color:var(--ink);opacity:.78\">InsideView<\u002Fspan>\n      <span style=\"color:var(--border)\">·<\u002Fspan>\n      <span style=\"font:600 14px 'Space Grotesk';color:var(--ink);opacity:.78\">Oracle<\u002Fspan>\n      <span style=\"color:var(--border)\">·<\u002Fspan>\n      <span style=\"font:600 14px 'Space Grotesk';color:var(--ink);opacity:.78\">Carnegie Mellon<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== PROOF BAND ===== -->\n  <sc-if value=\"{{ showProofBand }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"background:var(--dark)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:64px 40px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:32px;flex-wrap:wrap\">\n        <div>\n          <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent-2)\">// THE PROOF · SAFAR TELECARE<\u002Fdiv>\n          <h2 style=\"font:700 40px/1.1 'Space Grotesk';letter-spacing:-.02em;color:#F4F1EC;margin:16px 0 0\">Internal tool to acquisition.<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font:400 15px/1.6 'Libre Franklin';color:var(--dark-sub);max-width:380px;margin:0\">The bottleneck in tele-critical-care wasn't technology — it was specialist time. One multi-tenant platform multiplied capacity, then became a sellable asset.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--dark-surface);border:1px solid var(--dark-surface);border-radius:12px;overflow:hidden;margin-top:36px\">\n        <div style=\"background:var(--dark);padding:28px 24px\"><div style=\"font:700 44px 'Space Grotesk';color:#F4F1EC;letter-spacing:-.02em\">≈92%<\u002Fdiv><div style=\"font:500 12px 'IBM Plex Mono';color:var(--dark-sub);margin-top:8px\">response time ↓<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--dark);padding:28px 24px\"><div style=\"font:700 44px 'Space Grotesk';color:#F4F1EC;letter-spacing:-.02em\">≈3×<\u002Fdiv><div style=\"font:500 12px 'IBM Plex Mono';color:var(--dark-sub);margin-top:8px\">provider capacity ↑<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--dark);padding:28px 24px\"><div style=\"font:700 44px 'Space Grotesk';color:#F4F1EC;letter-spacing:-.02em\">$4.5M+<\u002Fdiv><div style=\"font:500 12px 'IBM Plex Mono';color:var(--dark-sub);margin-top:8px\">annual savings<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--dark);padding:28px 24px\"><div style=\"font:700 44px 'Space Grotesk';color:var(--accent-2);letter-spacing:-.02em\">≈3×<\u002Fdiv><div style=\"font:500 12px 'IBM Plex Mono';color:var(--dark-sub);margin-top:8px\">value at exit · eVisit<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===== THROUGH-LINE / ABOUT ===== -->\n  <section id=\"about\" style=\"max-width:1180px;margin:0 auto;padding:92px 40px\">\n    <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent)\">// THE THROUGH-LINE<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:64px;margin-top:20px;align-items:start\">\n      <h2 style=\"font:700 46px/1.08 'Space Grotesk';letter-spacing:-.025em;color:var(--ink);margin:0;text-wrap:balance\">The constant was never a domain. It was a method.<\u002Fh2>\n      <div>\n        <p style=\"font:400 18px/1.65 'Libre Franklin';color:var(--ink);margin:0\">I drop into a market I don't yet understand, learn it from first principles, find the real constraint, and build against it.<\u002Fp>\n        <p style=\"font:400 17px/1.65 'Libre Franklin';color:var(--sub);margin:18px 0 0\">I've done that in CRM data, in real estate, and — for the last six years — in regulated healthcare, where the stakes and the expertise run deepest. I originate venture theses, build and scale enterprise platforms, sit across the table as an investor and board observer, and carry products to acquisition.<\u002Fp>\n        <a href=\"#method\" style=\"display:inline-flex;align-items:center;gap:8px;font:600 14px 'Space Grotesk';color:var(--accent);text-decoration:none;margin-top:22px\" style-hover=\"gap:12px\">How I learn a domain →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SELECTED WORK ===== -->\n  <section id=\"work\" style=\"background:var(--surface-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:88px 40px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px\">\n        <div>\n          <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent)\">// SELECTED WORK<\u002Fdiv>\n          <h2 style=\"font:700 42px/1.08 'Space Grotesk';letter-spacing:-.025em;color:var(--ink);margin:16px 0 0\">The method, applied.<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font:400 15px/1.6 'Libre Franklin';color:var(--sub);max-width:340px;margin:0\">Each is framed the same way: the bet, the call I made, what happened, and what it proves.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:44px\">\n\n        <a href=\"#work\" style=\"text-decoration:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:block\" style-hover=\"transform:translateY(-4px);box-shadow:0 22px 44px -26px rgba(60,35,15,.45)\">\n          <div style=\"position:relative;isolation:isolate;aspect-ratio:16/10;background:#2a1a0e\">\n            <image-slot id=\"work-safar\" shape=\"rect\" placeholder=\"Safar visual\" style=\"position:absolute;inset:0;width:100%;height:100%;filter:grayscale(1) contrast(1.05)\"><\u002Fimage-slot>\n            <div style=\"position:absolute;inset:0;background:#3a2410;mix-blend-mode:multiply;pointer-events:none\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;background:#E9B877;mix-blend-mode:screen;pointer-events:none\"><\u002Fdiv>\n            <span style=\"position:absolute;left:14px;top:14px;background:var(--accent);color:#fff;font:600 9px 'IBM Plex Mono';letter-spacing:.06em;padding:5px 9px;border-radius:14px;pointer-events:none\">EXIT · eVISIT<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:22px 22px 24px\">\n            <div style=\"font:700 21px 'Space Grotesk';letter-spacing:-.01em;color:var(--ink)\">Safar Telecare<\u002Fdiv>\n            <div style=\"font:500 13px 'IBM Plex Mono';color:var(--accent);margin-top:5px\">Internal tool → acquisition<\u002Fdiv>\n            <p style=\"font:400 14px/1.55 'Libre Franklin';color:var(--sub);margin:12px 0 0\">I saw platform leverage where others saw features — then turned an internal cost center into a commercial exit.<\u002Fp>\n            <div style=\"font:600 13px 'Space Grotesk';color:var(--ink);margin-top:18px\">Read the case study →<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#work\" style=\"text-decoration:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:block\" style-hover=\"transform:translateY(-4px);box-shadow:0 22px 44px -26px rgba(60,35,15,.45)\">\n          <div style=\"position:relative;isolation:isolate;aspect-ratio:16/10;background:#2a1a0e\">\n            <image-slot id=\"work-braincheck\" shape=\"rect\" placeholder=\"BrainCheck visual\" style=\"position:absolute;inset:0;width:100%;height:100%;filter:grayscale(1) contrast(1.05)\"><\u002Fimage-slot>\n            <div style=\"position:absolute;inset:0;background:#3a2410;mix-blend-mode:multiply;pointer-events:none\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;background:#E9B877;mix-blend-mode:screen;pointer-events:none\"><\u002Fdiv>\n            <span style=\"position:absolute;left:14px;top:14px;background:rgba(26,23,20,.78);color:#F4F1EC;font:600 9px 'IBM Plex Mono';letter-spacing:.06em;padding:5px 9px;border-radius:14px;pointer-events:none\">BOARD OBSERVER<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:22px 22px 24px\">\n            <div style=\"font:700 21px 'Space Grotesk';letter-spacing:-.01em;color:var(--ink)\">BrainCheck<\u002Fdiv>\n            <div style=\"font:500 13px 'IBM Plex Mono';color:var(--accent);margin-top:5px\">Finding the real constraint<\u002Fdiv>\n            <p style=\"font:400 14px/1.55 'Libre Franklin';color:var(--sub);margin:12px 0 0\">The constraint wasn't the product — it was workflow. Integrate into Epic, re-engineer onboarding, then scale.<\u002Fp>\n            <div style=\"font:600 13px 'Space Grotesk';color:var(--ink);margin-top:18px\">Read the case study →<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#work\" style=\"text-decoration:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:block\" style-hover=\"transform:translateY(-4px);box-shadow:0 22px 44px -26px rgba(60,35,15,.45)\">\n          <div style=\"position:relative;isolation:isolate;aspect-ratio:16/10;background:#2a1a0e\">\n            <image-slot id=\"work-glimmer\" shape=\"rect\" placeholder=\"Glimmer visual\" style=\"position:absolute;inset:0;width:100%;height:100%;filter:grayscale(1) contrast(1.05)\"><\u002Fimage-slot>\n            <div style=\"position:absolute;inset:0;background:#3a2410;mix-blend-mode:multiply;pointer-events:none\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;background:#E9B877;mix-blend-mode:screen;pointer-events:none\"><\u002Fdiv>\n            <span style=\"position:absolute;left:14px;top:14px;background:rgba(26,23,20,.78);color:#F4F1EC;font:600 9px 'IBM Plex Mono';letter-spacing:.06em;padding:5px 9px;border-radius:14px;pointer-events:none\">0 → 1<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:22px 22px 24px\">\n            <div style=\"font:700 21px 'Space Grotesk';letter-spacing:-.01em;color:var(--ink)\">Glimmer Health<\u002Fdiv>\n            <div style=\"font:500 13px 'IBM Plex Mono';color:var(--accent);margin-top:5px\">Originating a venture from a gap<\u002Fdiv>\n            <p style=\"font:400 14px/1.55 'Libre Franklin';color:var(--sub);margin:12px 0 0\">A new care-model thesis for chronic pain — built from first principles, before there was anything to operate.<\u002Fp>\n            <div style=\"font:600 13px 'Space Grotesk';color:var(--ink);margin-top:18px\">Read the case study →<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== HOW I LEARN (signature) ===== -->\n  <section id=\"method\" style=\"max-width:1180px;margin:0 auto;padding:96px 40px\">\n    <div style=\"text-align:center;max-width:680px;margin:0 auto\">\n      <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent)\">// SIGNATURE · HOW I LEARN A DOMAIN<\u002Fdiv>\n      <h2 style=\"font:700 48px/1.06 'Space Grotesk';letter-spacing:-.025em;color:var(--ink);margin:18px 0 0;text-wrap:balance\">I don't start with the product. I start with the room.<\u002Fh2>\n      <p style=\"font:400 18px/1.6 'Libre Franklin';color:var(--sub);margin:18px 0 0\">Rapid domain acquisition is the skill that lets me move between markets. Here's the sequence I run every time.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:52px\">\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px 32px;display:flex;gap:22px\">\n        <div style=\"font:700 30px 'Space Grotesk';color:var(--accent);line-height:1;flex-shrink:0\">01<\u002Fdiv>\n        <div><div style=\"font:700 19px 'Space Grotesk';color:var(--ink)\">Map the experts and their incentives<\u002Fdiv><p style=\"font:400 15px/1.6 'Libre Franklin';color:var(--sub);margin:8px 0 0\">I learn who holds the knowledge, who decides, who pays, and who quietly blocks. In expert-heavy markets, the org chart lies and the incentive map doesn't.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px 32px;display:flex;gap:22px\">\n        <div style=\"font:700 30px 'Space Grotesk';color:var(--accent);line-height:1;flex-shrink:0\">02<\u002Fdiv>\n        <div><div style=\"font:700 19px 'Space Grotesk';color:var(--ink)\">Hunt the constraint, not the feature<\u002Fdiv><p style=\"font:400 15px/1.6 'Libre Franklin';color:var(--sub);margin:8px 0 0\">Almost every product I've shipped won because I found the real bottleneck — specialist time, onboarding friction, a broken handoff — and built against that.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px 32px;display:flex;gap:22px\">\n        <div style=\"font:700 30px 'Space Grotesk';color:var(--accent);line-height:1;flex-shrink:0\">03<\u002Fdiv>\n        <div><div style=\"font:700 19px 'Space Grotesk';color:var(--ink)\">Write a thesis I can be wrong about<\u002Fdiv><p style=\"font:400 15px/1.6 'Libre Franklin';color:var(--sub);margin:8px 0 0\">I commit a falsifiable point of view early and let the domain break it. The fastest way to learn a market is to be specifically, correctably wrong in front of people who know better.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px 32px;display:flex;gap:22px\">\n        <div style=\"font:700 30px 'Space Grotesk';color:var(--accent);line-height:1;flex-shrink:0\">04<\u002Fdiv>\n        <div><div style=\"font:700 19px 'Space Grotesk';color:var(--ink)\">Decide build / buy / partner from the thesis<\u002Fdiv><p style=\"font:400 15px/1.6 'Libre Franklin';color:var(--sub);margin:8px 0 0\">Once the constraint is clear, the path usually is too. My job is to make that call honestly — even when it's inconvenient for the org's default.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== ON AI ===== -->\n  <section style=\"background:var(--dark)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:88px 40px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center\">\n      <div>\n        <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent-2)\">// ON AI<\u002Fdiv>\n        <h2 style=\"font:700 38px/1.16 'Space Grotesk';letter-spacing:-.02em;color:#F4F1EC;margin:18px 0 0;text-wrap:balance\">AI's job isn't to replace the expert. It's to remove the friction between the expert's judgment and the action.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font:400 17px/1.65 'Libre Franklin';color:#cfc7bb;margin:0\">The teams that win treat AI as workflow leverage, not a feature. They earn trust before they take autonomy. And they design for the failure mode, not the demo — because in healthcare, the failure mode is the product.<\u002Fp>\n        <p style=\"font:400 16px/1.65 'Libre Franklin';color:var(--dark-sub);margin:18px 0 0\">I hold that view because I've built the workflow platforms where it's true — and I build small AI tools myself to keep the opinion honest.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== BUILD LOG ===== -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:80px 40px\">\n    <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:grid;grid-template-columns:1fr 1.4fr\">\n      <div style=\"position:relative;isolation:isolate;min-height:260px;background:#2a1a0e\">\n        <image-slot id=\"buildlog-shot\" shape=\"rect\" placeholder=\"Picture-to-Plate screenshot\" style=\"position:absolute;inset:0;width:100%;height:100%;filter:grayscale(1) contrast(1.05)\"><\u002Fimage-slot>\n        <div style=\"position:absolute;inset:0;background:#3a2410;mix-blend-mode:multiply;pointer-events:none\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:0;background:#E9B877;mix-blend-mode:screen;pointer-events:none\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:40px 44px\">\n        <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent)\">// BUILD LOG<\u002Fdiv>\n        <h3 style=\"font:700 30px 'Space Grotesk';letter-spacing:-.02em;color:var(--ink);margin:14px 0 0\">Picture-to-Plate<\u002Fh3>\n        <p style=\"font:400 16px/1.6 'Libre Franklin';color:var(--sub);margin:14px 0 0;max-width:460px\">An image-to-recipe app — built and shipped on GitHub. I build small things to learn how a technology actually behaves before I'd bet a product on it. This one taught me where applied AI is reliable, where it isn't, and what that means for product decisions.<\u002Fp>\n        <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:8px;font:600 14px 'Space Grotesk';color:var(--accent-ink);background:var(--ink);padding:12px 20px;border-radius:24px;text-decoration:none;margin-top:24px\" style-hover=\"filter:brightness(1.15)\">View on GitHub →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SIGNAL ===== -->\n  <section id=\"signal\" style=\"background:var(--surface-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:88px 40px\">\n      <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent)\">// SIGNAL<\u002Fdiv>\n      <h2 style=\"font:700 42px/1.08 'Space Grotesk';letter-spacing:-.025em;color:var(--ink);margin:16px 0 0\">Where I show up.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:24px;margin-top:40px\">\n        <a href=\"https://theproductsignal.com\" target=\"_blank\" style=\"text-decoration:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;border-top:3px solid var(--cobalt);display:block\" style-hover=\"transform:translateY(-3px);box-shadow:0 18px 36px -24px rgba(30,50,80,.4)\">\n          <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:8px;height:8px;border-radius:50%;background:var(--cobalt)\"><\u002Fspan><span style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--cobalt)\">PODCAST · HOST &amp; CO-CREATOR<\u002Fspan><\u002Fdiv>\n          <div style=\"font:700 24px 'Space Grotesk';letter-spacing:-.01em;color:var(--ink);margin-top:14px\">The Product Signal<\u002Fdiv>\n          <p style=\"font:400 15px/1.55 'Libre Franklin';color:var(--sub);margin:10px 0 0\">Two practitioners breaking down the product craft from first principles — what the job actually is, and why most frameworks only get you halfway.<\u002Fp>\n          <div style=\"font:600 13px 'Space Grotesk';color:var(--cobalt);margin-top:18px\">Listen →<\u002Fdiv>\n        <\u002Fa>\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n          <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 26px;flex:1\">\n            <div style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--accent)\">GUEST LECTURER<\u002Fdiv>\n            <div style=\"font:700 18px 'Space Grotesk';color:var(--ink);margin-top:10px\">Carnegie Mellon<\u002Fdiv>\n            <p style=\"font:400 13px/1.5 'Libre Franklin';color:var(--sub);margin:6px 0 0\">MS Product Management<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 26px;flex:1\">\n            <div style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--accent)\">ADVISOR<\u002Fdiv>\n            <div style=\"font:700 18px 'Space Grotesk';color:var(--ink);margin-top:10px\">Pittsburgh Health Data Alliance<\u002Fdiv>\n            <p style=\"font:400 13px/1.5 'Libre Franklin';color:var(--sub);margin:6px 0 0\">CMU capstone engagements<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 26px\">\n          <div style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--accent)\">SPEAKER<\u002Fdiv>\n          <div style=\"font:700 18px 'Space Grotesk';color:var(--ink);margin-top:10px\">Jumpstart Healthcare Accelerator<\u002Fdiv>\n          <p style=\"font:400 13px/1.5 'Libre Franklin';color:var(--sub);margin:6px 0 14px\">&amp; Product Tank<\u002Fp>\n          <div style=\"height:1px;background:var(--border);margin:0 0 14px\"><\u002Fdiv>\n          <div style=\"font:600 11px 'IBM Plex Mono';letter-spacing:.08em;color:var(--accent)\">EDUCATION<\u002Fdiv>\n          <p style=\"font:400 13px/1.5 'Libre Franklin';color:var(--sub);margin:8px 0 0\">CMU — MS, Product Management · BPUT — B.Tech CSE (Gold Medalist)<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CONTACT ===== -->\n  <section id=\"contact\" style=\"max-width:1180px;margin:0 auto;padding:108px 40px;text-align:center\">\n    <div style=\"font:600 12px 'IBM Plex Mono';letter-spacing:.16em;color:var(--accent)\">// CONTACT<\u002Fdiv>\n    <h2 style=\"font:700 52px/1.06 'Space Grotesk';letter-spacing:-.03em;color:var(--ink);margin:18px auto 0;max-width:760px;text-wrap:balance\">Building something ambitious in a hard market? That's the conversation I want.<\u002Fh2>\n    <div style=\"display:flex;gap:12px;justify-content:center;margin-top:36px;flex-wrap:wrap\">\n      <a href=\"mailto:hello@example.com\" style=\"font:600 14px 'Space Grotesk';color:var(--accent-ink);background:var(--accent);padding:14px 26px;border-radius:28px;text-decoration:none\" style-hover=\"filter:brightness(1.06);transform:translateY(-1px)\">Email me →<\u002Fa>\n      <a href=\"#contact\" style=\"font:600 14px 'Space Grotesk';color:var(--ink);border:1.5px solid var(--ink);padding:13px 24px;border-radius:28px;text-decoration:none\" style-hover=\"background:var(--ink);color:var(--paper)\">LinkedIn<\u002Fa>\n      <a href=\"#contact\" style=\"font:600 14px 'Space Grotesk';color:var(--ink);border:1.5px solid var(--ink);padding:13px 24px;border-radius:28px;text-decoration:none\" style-hover=\"background:var(--ink);color:var(--paper)\">GitHub<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:var(--dark)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px\">\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <span style=\"width:24px;height:24px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font:700 12px 'Space Grotesk';color:#fff\">M<\u002Fspan>\n        <span style=\"font:700 14px 'Space Grotesk';color:#F4F1EC\">A. Mishra<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font:500 11px 'IBM Plex Mono';color:var(--dark-sub)\">Product &amp; Venture Leadership · Pittsburgh<\u002Fdiv>\n      <div style=\"display:flex;gap:18px\"><a href=\"#signal\" style=\"font:500 11px 'IBM Plex Mono';color:var(--dark-sub);text-decoration:none\" style-hover=\"color:#F4F1EC\">PODCAST<\u002Fa><a href=\"#contact\" style=\"font:500 11px 'IBM Plex Mono';color:var(--dark-sub);text-decoration:none\" style-hover=\"color:#F4F1EC\">EMAIL<\u002Fa><a href=\"#contact\" style=\"font:500 11px 'IBM Plex Mono';color:var(--dark-sub);text-decoration:none\" style-hover=\"color:#F4F1EC\">LINKEDIN<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Clay&quot;,&quot;Cobalt&quot;,&quot;Vermilion&quot;,&quot;Green&quot;],&quot;default&quot;:&quot;Clay&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;paper&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Warm&quot;,&quot;Cool&quot;],&quot;default&quot;:&quot;Warm&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showProofBand&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const accents = {\n      Clay:      ['#B86E3A', '#E0A45E', '#FFFFFF'],\n      Cobalt:    ['#2E6FB7', '#6E9FDA', '#FFFFFF'],\n      Vermilion: ['#DD4F33', '#EDA28F', '#FFFFFF'],\n      Green:     ['#1F8A5B', '#86C9A8', '#FFFFFF'],\n    };\n    const a = accents[this.props.accent] || accents.Clay;\n    let s = `--accent:${a[0]};--accent-2:${a[1]};--accent-ink:${a[2]};`;\n    if (this.props.paper === 'Cool') {\n      s += '--paper:#EEF0F2;--surface-2:#F6F7F8;--sub:#6B7079;--border:#DEE0E3;';\n    }\n    return {\n      themeStyle: s,\n      showProofBand: this.props.showProofBand !== false,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
